<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Alta de Edición de Evento</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/AltaEdicionEvento.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <button class="hamburguesa" onclick="toggleMenu()">☰</button>

      <aside id="sidebar" class="sidebar-mobile">
        <h3><i class='bx bx-list-ul'></i> Menú</h3>
        <ul id="menuList"><!-- JS inyecta el menú según rol --></ul>
      </aside>

      <a class="brand" href="index.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>

      <nav class="main-nav">
        <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar">
          <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
          <button class="btn" type="submit">Buscar</button>
        </form>
      </nav>

      <nav class="user-nav" id="userNav">
        <a class="btn ghost" href="InicioSesion.html"><i class='bx bxs-user'></i> Iniciar Sesión</a>
        <a class="btn" href="AltaUsuario.html"><i class='bx bxs-user-plus'></i> Registrarse</a>
      </nav>
    </div>
  </header>

  <main class="container narrow">
    <h1>Alta de Edición de Evento</h1>

    <form id="form-edicion" class="card">
      <label>Evento existente<span style="color:red">*</span>
        <select id="evento" required>
          <option value="">-- Seleccionar evento --</option>
          <option value="ev1">JSConf</option>
          <option value="ev2">UX Day</option>
          <option value="ev3">Data Summit</option>
          <option value="ev4">Maratón de Montevideo</option>
        </select>
      </label>

      <label>Nombre único de la edición<span style="color:red">*</span>
        <input id="nombre" type="text" required>
      </label>

      <label>Sigla<span style="color:red">*</span>
        <input id="sigla" type="text" required>
      </label>

      <div class="row">
        <div>
          <label>Ciudad<span style="color:red">*</span>
            <input id="ciudad" type="text" required>
          </label>
        </div>
        <div>
          <label>País<span style="color:red">*</span>
            <input id="pais" type="text" required>
          </label>
        </div>
      </div>

      <div class="row">
        <div>
          <label>Fecha de inicio<span style="color:red">*</span>
            <input id="inicio" type="date" required>
          </label>
        </div>
        <div>
          <label>Fecha de fin<span style="color:red">*</span>
            <input id="fin" type="date" required>
          </label>
        </div>
      </div>

      <label>Imagen (opcional)
        <input id="img" type="file" accept="image/*">
      </label>
		
	  <p class="form-hint-altaEvento">Los campos marcados con * son obligatorios.</p>
	  
      <div class="form-actions-altaEvento">
        <button type="submit" class="btn-guardar-altaEvento">Guardar</button>
        <button type="reset" class="btn-cancelar-altaEvento">Cancelar</button>
      </div>
    </form>
  </main>

  <script>
    document.getElementById("form-edicion").addEventListener("submit", e => {
      e.preventDefault();
      const ediciones = JSON.parse(localStorage.getItem("ediciones") || "[]");

      const evento = document.getElementById("evento").value;
      const nombre = document.getElementById("nombre").value.trim();
      const sigla  = document.getElementById("sigla").value.trim();

      if (!evento) { alert("Seleccioná un evento."); return; }

      if (ediciones.find(e => e.nombre.toLowerCase() === nombre.toLowerCase())) {
        alert("El nombre de la edición ya está en uso.");
        return;
      }

      const nueva = {
        evento,
        nombre,
        sigla,
        ciudad: document.getElementById("ciudad").value,
        pais:   document.getElementById("pais").value,
        inicio: document.getElementById("inicio").value,
        fin:    document.getElementById("fin").value,
        estado: "Ingresada",
        fechaAlta: new Date().toISOString().split("T")[0]
      };

      ediciones.push(nueva);
      localStorage.setItem("ediciones", JSON.stringify(ediciones));
      mostrarDialogoExito('Edición creada con éxito.');
    });
  </script>

  <script src="../js/Hamburgesa.js"></script>
  <script src="../js/Login.js"></script>
  <script src="../js/Dialogos.js"></script>

  <script>
  // Header logueado (igual que lo venías usando)
  document.addEventListener("DOMContentLoaded", () => {
    const userNav = document.getElementById("userNav");
    const usuario = JSON.parse(sessionStorage.getItem("usuarioActivo"));

    if (usuario) {
      userNav.innerHTML = `
        <span>Hola, ${usuario.nombre}</span>
        <a class="btn" href="ModificarUsuario.html"><i class='bx bxs-user'></i> Mi Perfil</a>
        <a class="btn" href="CierreSesion.html"><i class='bx bxs-log-out'></i> Cerrar sesión</a>
      `;
    }
  });
  </script>
</body>
</html>
