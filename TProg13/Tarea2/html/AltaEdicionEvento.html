<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Alta de Edición de Evento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/AltaEdicionEvento.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <div style="position:relative;display:inline-block;">
        <button class="hamburguesa" onclick="toggleMenu()">☰</button>
        <!-- Dropdown Menu -->
        <div id="dropdownMenu" class="dropdown-menu" style="display:none;position:absolute;top:100%;left:0;z-index:100;min-width:180px;">
          <ul id="menuList">
            <!-- Aquí JS inyecta el menú según rol -->
          </ul>
        </div>
      </div>

      <a class="brand" href="index.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>

      <nav class="main-nav">
        <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar">
          <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
          <button class="btn" type="submit">Buscar</button>
        </form>
      </nav>

      <!-- Header con dropdown igual al otro -->
      <nav class="user-nav" id="userNav">
        <a class="btn ghost" href="InicioSesion.html"><i class='bx bxs-user'></i> Iniciar Sesión</a>
        <a class="btn" href="AltaUsuario.html"><i class='bx bxs-user-plus'></i> Registrarse</a>
      </nav>
    </div>
  </header>

  <main class="container narrow">
    <h1>Alta de Edición de Evento</h1>

    <form id="form-edicion" class="card">
      <label>Evento existente <span style="color:red">*</span>
        <select id="evento" required>
          <option value="">-- Seleccionar evento --</option>
        </select>
      </label>

      <label>Nombre único de la edición <span style="color:red">*</span>
        <input id="nombre" required>
      </label>

      <label>Sigla <span style="color:red">*</span>
        <input id="sigla" required>
      </label>

      <div class="row">
        <div>
          <label>Ciudad <span style="color:red">*</span>
            <input id="ciudad" required>
          </label>
        </div>
        <div>
          <label>País <span style="color:red">*</span>
            <input id="pais" required>
          </label>
        </div>
      </div>

      <div class="row">
        <div>
          <label>Fecha de inicio <span style="color:red">*</span>
            <input id="inicio" type="date" required>
          </label>
        </div>
        <div>
          <label>Fecha de fin <span style="color:red">*</span>
            <input id="fin" type="date" required>
          </label>
        </div>
      </div>

      <label>Imagen (opcional)
        <input id="img" type="file" accept="image/*">
      </label>

      <p class="form-hint-altaEvento">Los campos marcados con * son obligatorios.</p>

      <div class="form-actions-altaEvento">
        <button type="submit" class="btn-guardar-altaEvento">Guardar</button>
        <button type="button" class="btn-cancelar-altaEvento">Cancelar</button>
      </div>
    </form>
  </main>

  <!-- Orden: datos -> base -> página -->
  <script src="../js/CargaDatos.js"></script>
  <script src="../js/Hamburgesa.js"></script>
  <script src="../js/Dialogos.js"></script>
  <script src="../js/Login.js"></script>

  <script>
  // Header igual al otro (dropdown "Mi Perfil")
  document.addEventListener("DOMContentLoaded", () => {
    const userNav = document.getElementById("userNav");
    const u = JSON.parse(sessionStorage.getItem("usuarioActivo") || "null");
    if (u) {
      userNav.innerHTML = `
        <span>Hola, ${u.nombre || u.nick}</span>
        <div class="dropdown">
          <button class="dropbtn">Mi Perfil <i class='bx bxs-down-arrow'></i></button>
          <div class="dropdown-content">
            <a href="ConsultaUsuario.html?usuario=${u.nick}"><i class='bx bxs-id-card'></i> Ver Datos</a>
            <a href="ModificarUsuario.html?usuario=${u.nick}"><i class='bx bxs-edit'></i> Modificar Datos</a>
            <a href="CierreSesion.html"><i class='bx bxs-log-out'></i> Cerrar sesión</a>
          </div>
        </div>
      `;
    }
  });

  // Poblar select de eventos (desde localStorage.eventos). Si es organizador: solo los suyos.
  document.addEventListener("DOMContentLoaded", () => {
    const sel = document.getElementById("evento");
    const eventos = JSON.parse(localStorage.getItem("eventos") || "[]");
    const u = JSON.parse(sessionStorage.getItem("usuarioActivo") || "null");
    const rol = (u?.rol || "").toLowerCase();
    const nick = (u?.nick || "").toLowerCase();

    const lista = (rol === "organizador")
      ? eventos.filter(ev => (ev?.ediciones?.some(e => (e.organizador||"").toLowerCase() === nick)) || true)
      : eventos;

    // ⚠️ Si querés filtrar por "dueño real del evento", poné un campo 'organizador' en el evento.
    // Con los datos actuales, dejamos todos para crear nuevas ediciones.

    for (let i = sel.options.length - 1; i >= 1; i--) sel.remove(i);
    if (!lista.length) {
      const o = document.createElement("option");
      o.disabled = true; o.textContent = "No hay eventos disponibles";
      sel.appendChild(o);
    } else {
      lista.forEach(ev => {
        const o = document.createElement("option");
        o.value = ev.id;                // guarda id del evento (EV01, EV04, ...)
        o.textContent = ev.nombre;      // muestra el nombre
        sel.appendChild(o);
      });
    }
  });

  // Validación simple de fechas coherentes
  document.addEventListener("DOMContentLoaded", () => {
    const inicioEl = document.getElementById("inicio");
    const finEl = document.getElementById("fin");
    inicioEl.addEventListener("change", () => {
      finEl.min = inicioEl.value || "";
      if (finEl.value && finEl.value < finEl.min) finEl.value = "";
    });
    finEl.addEventListener("change", () => {
      inicioEl.max = finEl.value || "";
      if (inicioEl.value && inicioEl.max && inicioEl.value > inicioEl.max) inicioEl.value = "";
    });
  });

  // Cancelar
  document.addEventListener("DOMContentLoaded", () => {
    document.querySelector(".btn-cancelar-altaEvento")
      .addEventListener("click", () => location.href = "index.html");
  });

  // Guardar edición dentro de eventos[i].ediciones y persistir
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("form-edicion");
    const norm = s => (s||"").trim().toLowerCase();

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const eventoId = document.getElementById("evento").value;
      if (!eventoId) return alert("Seleccioná un evento.");

      const nombre = document.getElementById("nombre").value.trim();
      const sigla  = document.getElementById("sigla").value.trim();
      const ciudad = document.getElementById("ciudad").value.trim();
      const pais   = document.getElementById("pais").value.trim();
      const inicio = document.getElementById("inicio").value;
      const fin    = document.getElementById("fin").value;

      if (!inicio || !fin) return alert("Completá las fechas.");
      if (inicio > fin)   return alert("La fecha de inicio debe ser menor o igual a la de fin.");

      const eventos = JSON.parse(localStorage.getItem("eventos") || "[]");
      const ev = eventos.find(e => e.id === eventoId);
      if (!ev) return alert("Evento no encontrado.");

      ev.ediciones = ev.ediciones || [];

      // no permitir nombre repetido dentro del mismo evento
      const dup = ev.ediciones.some(ed => norm(ed.nombre) === norm(nombre));
      if (dup) return alert("Ya existe una edición con ese nombre para este evento.");

      // generar id si hace falta
      const genId = () => {
        const n = (ev.ediciones.length + 1).toString().padStart(2, "0");
        return `ED_${eventoId}_${n}`;
      };

      // organizador = nick del logueado si es organizador, si no, vacío
      const u = JSON.parse(sessionStorage.getItem("usuarioActivo") || "null");
      const organizador = (u && (u.rol||"").toLowerCase()==="organizador") ? (u.nick||"") : (ev.organizador||"");

      const nueva = {
        id: genId(),
        nombre,
        sigla,
        estado: "Ingresada",
        ciudad, pais, inicio, fin,
        alta: new Date().toISOString().slice(0,10),
        organizador,
        tiposRegistros: [],
        imagen: null
      };

      ev.ediciones.push(nueva);
      localStorage.setItem("eventos", JSON.stringify(eventos));

      if (typeof mostrarDialogoExito === "function") {
        mostrarDialogoExito("Edición creada con éxito.");
      } else {
        alert("Edición creada con éxito.");
      }
      form.reset();
    });
  });
  </script>
</body>
</html>
