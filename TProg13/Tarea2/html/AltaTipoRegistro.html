<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Alta de Tipo de Registro</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
     
	<!-- Botón hamburguesa -->
	<button class="hamburguesa" onclick="toggleMenu()">
	  ☰
	</button>
	
	<!-- Sidebar -->
	<aside id="sidebar" class="sidebar-mobile">
	  <h3><i class='bx bx-list-ul'></i> Menú</h3>
	  <ul id="menuList">
	    <!-- Aquí JS inyecta el menú según rol -->
	  </ul>

	</aside>
     <a class="brand" href="index.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>
      <nav class="main-nav">
        	    <!-- Izquierda: buscador -->
	    <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar">
	      <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
	      <button class="btn" type="submit">Buscar</button>
	    </form>
      </nav>
          <!-- 🔹 Zona dinámica de usuario -->
    <nav class="user-nav" id="userNav">
      <a class="btn ghost" href="InicioSesion.html"><i class='bx bxs-user'></i> Iniciar Sesión</a>
      <a class="btn" href="AltaUsuario.html"><i class='bx bxs-user-plus'></i> Registrarse</a>
    </nav>
    </div>
  </header>


  <main class="container">
    <section class="form-card-altaTipoRegistro">
      <h2>Alta de Tipo de Registro</h2>
      <form>
        <div class="form-group-altaTipoRegistro">
          <label for="edicion">Edición del evento<span style="color:red">*</span></label>
          <select id="edicion" name="edicion" required>
            <option value="">-- Seleccione una edición --</option>
            <option value="edicion1">Edición 1</option>
            <option value="edicion2">Edición 2</option>
            <option value="edicion3">Edición 3</option>
          </select>
        </div>

        <div class="form-group-altaTipoRegistro">
          <label for="nombre">Nombre<span style="color:red">*</span></label>
          <input type="text" id="nombre" name="nombre" required>
        </div>

        <div class="form-group-altaTipoRegistro">
          <label for="descripcion">Descripción<span style="color:red">*</span></label>
          <textarea id="descripcion" name="descripcion" rows="4" required></textarea>
        </div>

        <div class="form-group-altaTipoRegistro">
          <label for="costo">Costo<span style="color:red">*</span></label>
          <input type="number" id="costo" name="costo" min="0" required>
        </div>

        <div class="form-group-altaTipoRegistro">
          <label for="cupo">Cupo<span style="color:red">*</span></label>
          <input type="number" id="cupo" name="cupo" min="1" required>
        </div>

        <p class="form-hint-altaTipoRegistro">Los campos marcados con * son obligatorios.</p>

        <div class="form-actions-altaEvento">
          <button type="submit" class="btn-guardar-altaEvento">Guardar</button>
          <button type="reset" class="btn-cancelar-altaEvento">Cancelar</button>
        </div>
      </form>
    </section>
  </main>
  <script src="../js/Hamburgesa.js"></script>
  <script src="../js/Login.js"></script>
  <script src="../js/Dialogos.js"></script>
  <script>
    // Cancelar -> inicio
    document.querySelector('.btn-cancelar-altaEvento').addEventListener('click', function(e) {
      e.preventDefault();
      window.location.href = 'index.html';
    });

    // Normaliza para comparar nombres sin tildes/espacios extra/mayúsculas
    function normalize(s){
      return (s || '')
        .trim()
        .replace(/\s+/g, ' ')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    document.querySelector('.form-card-altaTipoRegistro form').addEventListener('submit', function(e) {
      e.preventDefault();

      const edicion = document.getElementById("edicion").value;
      const nombre  = document.getElementById("nombre").value;

      if (!edicion) { 
        alert("Seleccioná una edición.");
        return;
      }

      const tipos = JSON.parse(localStorage.getItem("tiposRegistro") || "[]");
      const dup = tipos.some(t => t.edicion === edicion && normalize(t.nombre) === normalize(nombre));

      if (dup) {
        // Mensaje según el caso de uso: informar y permitir corregir o cancelar
        if (typeof mostrarDialogoError === 'function') {
          mostrarDialogoError("Ya existe un tipo de registro con ese nombre para esta edición. Podés elegir otro nombre o cancelar.");
        } else {
          alert("Ya existe un tipo de registro con ese nombre para esta edición. Podés elegir otro nombre o cancelar.");
        }
        // Enfocar el campo para que el organizador corrija
        document.getElementById("nombre").focus();
        return;
      }

      // Si no hay duplicado, crear el tipo de registro
      const nueva = {
        edicion,
        nombre: nombre.trim(),
        descripcion: document.getElementById("descripcion").value.trim(),
        costo: Number(document.getElementById("costo").value),
        cupo:  Number(document.getElementById("cupo").value),
        fechaAlta: new Date().toISOString().split("T")[0]
      };

      tipos.push(nueva);
      localStorage.setItem("tiposRegistro", JSON.stringify(tipos));

      // Éxito: mostrar modal (redirigir solo si vos querés)
      if (typeof mostrarDialogoExito === 'function') {
        // si tu modal devuelve Promesa, podrías redirigir al cerrar:
        // mostrarDialogoExito('Tipo de registro creado con éxito.').finally(() => location.href='index.html');
        mostrarDialogoExito('Tipo de registro creado con éxito.');
      } else {
        alert('Tipo de registro creado con éxito.');
      }
    });
  </script>

  <script>
  // Header logueado (igual que lo venías usando)
  document.addEventListener("DOMContentLoaded", () => {
    const userNav = document.getElementById("userNav");
    const usuario = JSON.parse(sessionStorage.getItem("usuarioActivo"));

    if (usuario) {
      userNav.innerHTML = `
        <span>Hola, ${usuario.nombre}</span>
        <a class="btn" href="ModificarUsuario.html"><i class='bx bxs-user'></i> Mi Perfil</a>
        <a class="btn" href="CierreSesion.html"><i class='bx bxs-log-out'></i> Cerrar sesión</a>
      `;
    }
  });
  </script>
</body>
</html>
