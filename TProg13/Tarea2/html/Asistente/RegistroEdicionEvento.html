<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro a Edición de Evento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/RegistroEdicionEvento.css">
</head>
<body>
<!-- Header -->
<header class="site-header">
  <div class="container" style="display:flex;align-items:center;justify-content:space-between;gap:1rem;">
    <!-- Marca -->
    <a class="brand" href="index-asistente.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>

    <!-- Buscador -->
    <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar" style="display:flex;gap:.5rem;">
      <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
      <button class="btn" type="submit">Buscar</button>
    </form>
  </div>
</header>

  <!-- Layout -->
  <div class="container row" style="margin-top:1rem;">
    <!-- Sidebar -->
    <aside class="card">
      <h3>Menú</h3>
      <h4>Acciones</h4>
      <ul>
        <li><a href="RegistroEdicionEvento.html">Registrarse a edición de evento</a></li>
      </ul>
      <h4>Categorías</h4>
      <ul>
        <li><a href="#">Tecnología</a></li>
        <li><a href="#">Deporte</a></li>
        <li><a href="#">Salud</a></li>
        <li><a href="#">Cultura</a></li>
        <li><a href="#">Entretenimiento</a></li>
        <li><a href="#">Negocios</a></li>
      </ul>
      <h4><a href="ConsultaUsuario-Asistente.html">Listar Usuarios</a></h4>
    </aside>

    <!-- Main -->
    <main class="container narrow">
      <h1>Registro a Edición de Evento</h1>

      <section class="card">


        <!-- Edición (todas, agrupadas) -->
        <label>Seleccionar edición
          <select>
            <option value="">-- Seleccionar edición --</option>
            <optgroup label="Conferencia de Tecnología">
              <option value="EDEV08">Tecnología Punta del Este 2026</option>
              <option value="EDEV09">Mobile World Congress 2025</option>
              <option value="EDEV10">Web Summit 2026</option>
            </optgroup>
            <optgroup label="Maratón de Montevideo">
              <option value="EDEV03">Maratón de Montevideo 2024</option>
              <option value="EDEV04">Maratón de Montevideo 2022</option>
            </optgroup>
          </select>
        </label>

        <!-- Tipos de registro (listado completo) -->
        <label>Tipo de registro
          <select>
            <option value="">-- Seleccionar tipo de registro --</option>
            <!-- EDEV03 -->
            <option value="TR07">Corredor 21K (EDEV03)</option>
            <!-- EDEV08 -->
            <option value="TR19">Estudiante (EDEV08)</option>
            <!-- EDEV09 -->
            <option value="TR20">Full (EDEV09)</option>
            <!-- EDEV10 -->
            <option value="TR25">Estudiante (EDEV10)</option>
          </select>
        </label>

        <!-- Código -->
        <label>Código de patrocinio (opcional)
          <input type="text">
        </label>

        <!-- Acciones (sin JS) -->
        <div class="form-actions-altaEvento">
          <a class="btn-guardar-altaEvento" href="index-asistente.html">Guardar</a>
          <a class="btn-cancelar-altaEvento" href="index-asistente.html">Cancelar</a>
        </div>

      </section>
    </main>
  </div>
</body>
</html>
