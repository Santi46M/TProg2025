<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión — Eventos.uy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="index.html">Eventos.uy</a>
      <nav class="main-nav">
        <a href="index.html#cat/tecnologia">Tecnología</a>
        <a href="index.html#cat/arte">Arte</a>
        <a href="index.html#cat/deporte">Deporte</a>
        <a href="index.html#cat/ciencia">Ciencia</a>
      </nav>
      <nav class="user-nav">
        <a class="btn ghost" href="AltaUsuario.html">Registrarse</a>
      </nav>
    </div>
  </header>

  <main class="container narrow">
    <h1>Iniciar sesión</h1>
    <form id="loginForm" class="card form">
      <div class="row">
        <div>
          <label for="email">Correo electrónico</label>
          <input id="email" name="email" type="email" required>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="pass">Contraseña</label>
          <input id="pass" name="pass" type="password" required>
        </div>
      </div>
      <div class="actions">
        <button type="submit" class="btn">Ingresar</button>
        <a class="btn ghost" href="index.html">Cancelar</a>
      </div>
      <p id="error" style="color:red;display:none;">Credenciales incorrectas</p>
    </form>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const error = document.getElementById('error');

    form.addEventListener('submit', e => {
      e.preventDefault();
      const email = form.email.value.trim();
      const pass  = form.pass.value;

      const usuarios = JSON.parse(localStorage.getItem("usuarios") || "[]");
      const user = usuarios.find(u => u.email === email && u.pass === pass);

      if (user) {
        sessionStorage.setItem("usuarioActivo", JSON.stringify(user));
        window.location.href = "index.html";
      } else {
        error.style.display = "block";
      }
    });
  </script>
</body>
</html>
