<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Modificar Datos de Usuario — Eventos.uy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- CSS global -->
  <link rel="stylesheet" href="../css/style.css" />
  <!-- CSS específico -->
  <link rel="stylesheet" href="../css/ModificarUsuario.css" />
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
     
	<!-- Botón hamburguesa -->
	<button class="hamburguesa" onclick="toggleMenu()">
	  ☰
	</button>
	
	<!-- Sidebar -->
	<aside id="sidebar" class="sidebar-mobile">
	  <h3><i class='bx bx-list-ul'></i> Menú</h3>
	  <ul id="menuList">
	    <!-- Aquí JS inyecta el menú según rol -->
	  </ul>

	</aside>
     <a class="brand" href="index.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>
      <nav class="main-nav">
        	    <!-- Izquierda: buscador -->
	    <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar">
	      <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
	      <button class="btn" type="submit">Buscar</button>
	    </form>
      </nav>
          <!--  Zona dinámica de usuario -->
    <nav class="user-nav" id="userNav">
      <a class="btn ghost" href="InicioSesion.html"><i class='bx bxs-user'></i> Iniciar Sesión</a>
      <a class="btn" href="AltaUsuario.html"><i class='bx bxs-user-plus'></i> Registrarse</a>
    </nav>
    </div>
  </header>


  <main class="container narrow">
    <h1>Modificar Datos de Usuario</h1>
    <p>Todos los campos son <strong>opcionales</strong>. Dejá vacío lo que no quieras cambiar.</p>

    <form id="editForm" class="card form" action="#" method="post" enctype="multipart/form-data">
      <!-- Datos básicos -->
      <fieldset>
        <legend>Datos básicos</legend>

        <div class="row">
          <div>
            <label for="nombre">Nombre</label>
            <input id="nombre" name="nombre" type="text">
          </div>
          <div>
            <label for="apellido">Apellido</label>
            <input id="apellido" name="apellido" type="text">
          </div>
        </div>

        <div class="row">
          <div>
            <label for="nac">Fecha de nacimiento</label>
            <input id="nac" name="nac" type="date">
          </div>
          <div>
            <label for="web">Link a sitio web</label>
            <input id="web" name="web" type="url" placeholder="https://...">
          </div>
        </div>

        <div>
          <label for="desc">Descripción</label>
          <textarea id="desc" name="desc" rows="3"></textarea>
        </div>
      </fieldset>

      <!-- Imagen -->
      <fieldset>
        <legend>Imagen de perfil</legend>
        <div class="img-row">
          <div id="fotoWrap"><span>Sin imagen</span></div>
          <div class="img-actions">
            <label for="img">Subir nueva imagen</label>
            <input id="img" name="img" type="file" accept="image/*">
            <label class="chk">
              <input type="checkbox" id="elimImg" name="elimImg">
              Quitar imagen actual
            </label>
          </div>
        </div>
      </fieldset>

      <!-- Contraseña -->
      <fieldset>
        <legend>Cambiar contraseña</legend>
        <p class="muted">Dejalo vacío si no querés cambiarla.</p>
        <label for="passNueva">Nueva contraseña</label>
        <input id="passNueva" name="passNueva" type="password">
      </fieldset>

      <div class="actions">
        <button type="submit" class="btn">Guardar cambios</button>
        <a class="btn ghost" href="index.html">Cancelar</a>
      </div>
    </form>

    <p><a href="index.html">← Volver al inicio</a></p>
  </main>

  <script>
  // Preview de imagen
  const inputImg = document.getElementById('img');
  const fotoWrap = document.getElementById('fotoWrap');
  inputImg.addEventListener('change', () => {
    const file = inputImg.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      fotoWrap.innerHTML = '';
      const img = document.createElement('img');
      img.src = e.target.result;
      img.alt = 'Vista previa';
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.objectFit = 'cover';
      fotoWrap.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
  </script>
   <script src="../js/Hamburgesa.js"></script>
<script src="../js/Login.js"></script>
</body>
</html>
