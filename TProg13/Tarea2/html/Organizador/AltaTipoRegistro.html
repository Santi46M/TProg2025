<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Alta de Tipo de Registro — Eventos.uy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../css/style.css">
  <style>
    /* Ajuste de ancho del formulario */
    .form-card-altaTipoRegistro {
      max-width: 960px;
      margin: 2rem auto;
    }
  </style>
</head>
<body>
  <!-- Header -->
<!-- Header -->
<header class="site-header">
  <div class="container" style="display:flex;align-items:center;justify-content:space-between;gap:1rem;">
    <!-- Marca -->
    <a class="brand" href="index-organizador.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>

    <!-- Buscador -->
    <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar" style="display:flex;gap:.5rem;">
      <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
      <button class="btn" type="submit">Buscar</button>
    </form>
  </div>
</header>

  <!-- Layout con sidebar -->
  <div class="container row" style="margin-top:1rem;">
    <!-- Sidebar -->
    <aside class="card">
      <h3><i class='bx bx-list-ul'></i> Menú</h3>
      <h4>Acciones</h4>
      <ul>
        <li><a href="AltaEvento.html"><i class='bx bx-edit'></i> Alta Evento</a></li>
        <li><a href="AltaEdicionEvento.html"><i class='bx bx-edit'></i> Alta de Edicion Evento</a></li>
        <li><a href="AltaTipoRegistro.html"><i class='bx bx-edit'></i> Alta Tipo Registro</a></li>
      </ul>
      <h4>Categorías</h4>
      <ul>
        <li><a href="#">Tecnología</a></li>
        <li><a href="#">Innovación</a></li>
        <li><a href="#">Literatura</a></li>
        <li><a href="#">Cultura</a></li>
        <li><a href="#">Música</a></li>
        <li><a href="#">Deporte</a></li>
        <li><a href="#">Salud</a></li>
        <li><a href="#">Entretenimiento</a></li>
        <li><a href="#">Negocios</a></li>
      </ul>
      <h4><a href="ConsultaUsuario-organizador.html">Listar Usuarios</a></h4>
    </aside>

    <!-- Contenido principal -->
    <main class="container">
      <section class="form-card-altaTipoRegistro">
        <h2>Alta de Tipo de Registro</h2>

        <form>
          <div class="form-group-altaTipoRegistro">
            <label>Edición del evento <span style="color:red">*</span></label>
            <select required>
              <option value="">-- Seleccione una edición --</option>
              <option value="EDEV08">Tecnología Punta del Este 2026</option>
              <option value="EDEV09">Mobile World Congress 2025</option>
              <option value="EDEV10">Web Summit 2026</option>
              <option value="EDEV03">Maratón de Montevideo 2024</option>
              <option value="EDEV04">Maratón de Montevideo 2022</option>
            </select>
          </div>

          <div class="form-group-altaTipoRegistro">
            <label>Nombre <span style="color:red">*</span></label>
            <input required>
          </div>

          <div class="form-group-altaTipoRegistro">
            <label>Descripción <span style="color:red">*</span></label>
            <textarea rows="4" required></textarea>
          </div>

          <div class="form-group-altaTipoRegistro">
            <label>Costo <span style="color:red">*</span></label>
            <input type="number" min="0" step="0.01" required>
          </div>

          <div class="form-group-altaTipoRegistro">
            <label>Cupo <span style="color:red">*</span></label>
            <input type="number" min="1" required>
          </div>

          <div class="form-actions-altaEvento">
            <button type="submit" class="btn-guardar-altaEvento">Guardar</button>
            <a href="index-organizador.html" class="btn-cancelar-altaEvento">Cancelar</a>
          </div>
        </form>
      </section>
    </main>
  </div>

  <!-- ======= JS ORIGINAL COMENTADO ======= -->

</body>
</html>
