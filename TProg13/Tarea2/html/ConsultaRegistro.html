  <link rel="stylesheet" href="../css/ConsultaRegistro.css">
</head>
<body>

        <button class="hamburguesa" onclick="toggleMenu()">☰</button>
        <!-- Dropdown Menu -->
        <div id="dropdownMenu" class="dropdown-menu" style="display:none;position:absolute;top:100%;left:0;z-index:100;min-width:180px;">
          <ul id="menuList">
            <!-- Aquí JS inyecta el menú según rol -->
          </ul>
        </div>
      </div>
     <a class="brand" href="index.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>
      <nav class="main-nav">
        	    <!-- Izquierda: buscador -->
	    <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar">
	      <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
	      <button class="btn" type="submit">Buscar</button>
	    </form>
      </nav>
          <!-- Zona dinámica de usuario -->
    <nav class="user-nav" id="userNav">
      <a class="btn ghost" href="InicioSesion.html"><i class='bx bxs-user'></i> Iniciar Sesión</a>
      <a class="btn" href="AltaUsuario.html"><i class='bx bxs-user-plus'></i> Registrarse</a>
    </nav>
    </div>
  </header>
  
  <main class="container">
    <section class="layout">
      <!-- Sidebar fijo -->
      <aside class="sidebar">

        <nav class="side-group">
          <h3>Categorías</h3>
          <a href="index.html#cat/tecnologia">Tecnología</a>
          <a href="index.html#cat/innovacion">Innovación</a>
          <a href="index.html#cat/literatura">Literatura</a>
          <a href="index.html#cat/cultura">Cultura</a>
          <a href="index.html#cat/musica">Música</a>
          <a href="index.html#cat/deporte">Deporte</a>
          <a href="index.html#cat/salud">Salud</a>
          <a href="index.html#cat/entretenimiento">Entretenimiento</a>
          <a href="index.html#cat/negocios">Negocios</a>
        </nav>
      </aside>

      <!--  Contenido principal -->
      <article class="content">
        <h1>Consulta de Registro</h1>

        <!-- Selección de edición -->
        <section class="card">
          <label for="selEdicion">Seleccionar edición</label>
          <select id="selEdicion">
            <option value="">-- Seleccionar edición --</option>
          </select>
        </section>

        <!-- Lista de usuarios registrados (solo organizador) -->
        <section id="boxUsuarios" class="card hide">
          <h2>Usuarios registrados</h2>
          <ul id="listaUsuarios"></ul>
        </section>

        <!-- Detalle del registro -->
        <section id="boxDetalle" class="card hide">
          <h2>Detalle del registro</h2>
          <p><strong>Usuario:</strong> <span id="regUsuario">—</span></p>
          <p><strong>Fecha de registro:</strong> <span id="regFecha">—</span></p>
          <p><strong>Tipo de registro:</strong> <span id="regTipo">—</span></p>
          <p><strong>Patrocinio usado:</strong> <span id="regPatrocinio">—</span></p>
        </section>
      </article>
    </section>
  </main>

  <script>


  // utilidades
  const $ = s => document.querySelector(s);
  const el = (t, attrs={}, txt) => {
    const n=document.createElement(t);
    Object.entries(attrs).forEach(([k,v])=>n.setAttribute(k,v));
    if(txt!=null) n.textContent=txt;
    return n;
  };

  const selEdicion = $('#selEdicion');
  const boxUsuarios = $('#boxUsuarios');
  const listaUsuarios = $('#listaUsuarios');
  const boxDetalle = $('#boxDetalle');

  const regUsuario = $('#regUsuario');
  const regFecha = $('#regFecha');
  const regTipo = $('#regTipo');
  const regPatrocinio = $('#regPatrocinio');

  // cargar ediciones según rol
  function cargarEdiciones() {
    selEdicion.innerHTML = '<option value="">-- Seleccionar edición --</option>';
    let ediciones;
    if (SESION.rol === "organizador") {
      ediciones = DATA.filter(e => e.organizador === SESION.nick);
    } else {
      ediciones = DATA.filter(e => e.registros.some(r => r.usuario === SESION.nick));
    }
    ediciones.forEach(e => selEdicion.appendChild(el('option',{value:e.id},e.nombre)));
  }

  // al elegir edición
  selEdicion.addEventListener('change', () => {
    boxDetalle.classList.add('hide');
    listaUsuarios.innerHTML = "";
    const ed = DATA.find(e => e.id === selEdicion.value);
    if (!ed) return;

    if (SESION.rol === "organizador") {
      // listar usuarios registrados
      ed.registros.forEach(r => {
        const li = el('li', {}, r.usuario);
        li.addEventListener('click', ()=>mostrarDetalle(r));
        listaUsuarios.appendChild(li);
      });
      boxUsuarios.classList.remove('hide');
    } else {
      // asistente → ver su propio registro
      const reg = ed.registros.find(r => r.usuario === SESION.nick);
      if (reg) mostrarDetalle(reg);
      boxUsuarios.classList.add('hide');
    }
  });

  // mostrar detalle
  function mostrarDetalle(r) {
    regUsuario.textContent = r.usuario;
    regFecha.textContent = r.fecha;
    regTipo.textContent = r.tipo;
    regPatrocinio.textContent = r.patrocinio;
    boxDetalle.classList.remove('hide');
  }

  // init
  cargarEdiciones();
  </script>
   <script src="../js/Hamburgesa.js"></script>
<script src="../js/Login.js"></script>
<script src="../js/CargaUsers.js"></script>
</body>
</html>
