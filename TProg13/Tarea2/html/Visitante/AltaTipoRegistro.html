<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Alta de Tipo de Registro — Eventos.uy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <div style="position:relative;display:inline-block;">
        <button class="hamburguesa" onclick="toggleMenu()">☰</button>
        <!-- Dropdown Menu -->
        <div id="dropdownMenu" class="dropdown-menu" style="display:none;position:absolute;top:100%;left:0;z-index:100;min-width:180px;">
          <ul id="menuList">
            <!-- Aquí JS inyecta el menú según rol -->
          </ul>
        </div>
      </div>

      <a class="brand" href="index.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>

      <nav class="main-nav">
        <form class="search" action="/buscar" method="get" role="search">
          <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
          <button class="btn" type="submit">Buscar</button>
        </form>
      </nav>

      <!-- Header con dropdown 'Mi Perfil' (igual al otro) -->
      <nav class="user-nav" id="userNav">
        <a class="btn ghost" href="InicioSesion.html"><i class='bx bxs-user'></i> Iniciar Sesión</a>
        <a class="btn" href="AltaUsuario.html"><i class='bx bxs-user-plus'></i> Registrarse</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="form-card-altaTipoRegistro">
      <h2>Alta de Tipo de Registro</h2>

      <form id="formTipoRegistro">
        <div class="form-group-altaTipoRegistro">
          <label for="edicion">Edición del evento <span style="color:red">*</span></label>
          <select id="edicion" required>
            <option value="">-- Seleccione una edición --</option>
          </select>
        </div>

        <div class="form-group-altaTipoRegistro">
          <label for="nombre">Nombre <span style="color:red">*</span></label>
          <input id="nombre" required>
        </div>

        <div class="form-group-altaTipoRegistro">
          <label for="descripcion">Descripción <span style="color:red">*</span></label>
          <textarea id="descripcion" rows="4" required></textarea>
        </div>

        <div class="form-group-altaTipoRegistro">
          <label for="costo">Costo <span style="color:red">*</span></label>
          <input id="costo" type="number" min="0" step="0.01" required>
        </div>

        <div class="form-group-altaTipoRegistro">
          <label for="cupo">Cupo <span style="color:red">*</span></label>
          <input id="cupo" type="number" min="1" required>
        </div>

        <div class="form-actions-altaEvento">
          <button type="submit" class="btn-guardar-altaEvento">Guardar</button>
          <button type="button" class="btn-cancelar-altaEvento">Cancelar</button>
        </div>
      </form>
    </section>
  </main>

  <!-- Scripts (orden: datos -> base -> esta página) -->
  <script src="../js/CargaDatos.js"></script>
  <script src="../js/Hamburgesa.js"></script>

  <script>
  // Header "Mi Perfil" igual al otro
  document.addEventListener("DOMContentLoaded", () => {
    const userNav = document.getElementById("userNav");
    const u = JSON.parse(sessionStorage.getItem("usuarioActivo") || "null");

    if (u) {
      userNav.innerHTML = `
        <span>Hola, ${u.nombre || u.nick}</span>
        <div class="dropdown">
          <button class="dropbtn">Mi Perfil <i class='bx bxs-down-arrow'></i></button>
          <div class="dropdown-content">
            <a href="ConsultaUsuario.html?usuario=${u.nick}"><i class='bx bxs-id-card'></i> Ver Datos</a>
            <a href="ModificarUsuario.html?usuario=${u.nick}"><i class='bx bxs-edit'></i> Modificar Datos</a>
            <a href="CierreSesion.html"><i class='bx bxs-log-out'></i> Cerrar sesión</a>
          </div>
        </div>
      `;
    }
  });

  // Poblar ediciones (simple, estático, desde localStorage.eventos)
  document.addEventListener("DOMContentLoaded", () => {
    const sel = document.getElementById("edicion");
    const eventos = JSON.parse(localStorage.getItem("eventos") || "[]");
    const eds = eventos.flatMap(ev => ev.ediciones || []);
    const u = JSON.parse(sessionStorage.getItem("usuarioActivo") || "null");
    const rol = (u?.rol || "").toLowerCase();
    const nick = (u?.nick || "").toLowerCase();

    // si es organizador, mostrar solo sus ediciones
    const lista = (rol === "organizador")
      ? eds.filter(e => (e.organizador || "").toLowerCase() === nick)
      : eds;

    // limpiar y cargar
    for (let i = sel.options.length - 1; i >= 1; i--) sel.remove(i);
    if (!lista.length) {
      const opt = document.createElement("option");
      opt.disabled = true; opt.textContent = "No hay ediciones disponibles";
      sel.appendChild(opt);
    } else {
      lista.forEach(e => {
        const o = document.createElement("option");
        o.value = e.id || e.sigla || e.nombre;
        o.textContent = e.nombre || e.sigla || o.value;
        sel.appendChild(o);
      });
    }
  });

  // Guardar tipo de registro (estático a localStorage)
  document.addEventListener("DOMContentLoaded", () => {
    const form = document.getElementById("formTipoRegistro");
    const norm = s => (s||"").trim().toLowerCase();

    document.querySelector(".btn-cancelar-altaEvento")
      .addEventListener("click", () => location.href = "index.html");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const edicion = document.getElementById("edicion").value;
      const nombre  = document.getElementById("nombre").value;
      const descripcion = document.getElementById("descripcion").value;
      const costo = Number(document.getElementById("costo").value);
      const cupo  = Number(document.getElementById("cupo").value);

      if (!edicion) return alert("Seleccioná una edición.");

      const tipos = JSON.parse(localStorage.getItem("tiposRegistro") || "[]");
      const dup = tipos.some(t => t.edicion === edicion && norm(t.nombre) === norm(nombre));
      if (dup) return alert("Ya existe un tipo con ese nombre en esta edición.");

      tipos.push({ edicion, nombre: nombre.trim(), descripcion: descripcion.trim(), costo, cupo,
                   fechaAlta: new Date().toISOString().slice(0,10) });
      localStorage.setItem("tiposRegistro", JSON.stringify(tipos));
      alert("Tipo de registro creado con éxito.");
      form.reset();
    });
  });
  </script>
</body>
</html>
