<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión — Eventos.uy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <div style="position:relative;display:inline-block;">
        <button class="hamburguesa" onclick="toggleMenu()">☰</button>
        <!-- Dropdown Menu -->
        <div id="dropdownMenu" class="dropdown-menu" style="display:none;position:absolute;top:100%;left:0;z-index:100;min-width:180px;">
          <ul id="menuList">
            <!-- Aquí JS inyecta el menú según rol -->
          </ul>
        </div>
      </div>

      <a class="brand" href="index.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>

      <nav class="main-nav">
        <!-- Izquierda: buscador -->
        <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar">
          <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
          <button class="btn" type="submit">Buscar</button>
        </form>
      </nav>

      <!--  Zona dinámica de usuario -->
      <nav class="user-nav" id="userNav">
        <a class="btn ghost" href="InicioSesion.html"><i class='bx bxs-user'></i> Iniciar Sesión</a>
        <a class="btn" href="AltaUsuario.html"><i class='bx bxs-user-plus'></i> Registrarse</a>
      </nav>
    </div>
  </header>

  <main class="container narrow">
    <h1>Iniciar sesión</h1>
    <form id="loginForm" class="card form">
      <div class="row">
        <div>
          <label for="email">Correo electrónico o Nickname</label>
          <input id="email" name="email" type="text" required placeholder="Correo o Nick">
        </div>
      </div>
      <div class="row">
        <div>
          <label for="pass">Contraseña</label>
          <input id="pass" name="pass" type="password" required>
        </div>
      </div>
      <div class="actions">
        <button type="submit" class="btn">Ingresar</button>
        <a class="btn ghost" href="index.html">Cancelar</a>
      </div>
      <p id="error" style="color:red;display:none;">Credenciales incorrectas</p>
    </form>
  </main>

  <!-- primero cargamos los datos de prueba -->
  <script src="../js/CargaUsers.js"></script>

  <!-- después el código de login -->
  <script>
    const form = document.getElementById('loginForm');
    const error = document.getElementById('error');

    form.addEventListener('submit', e => {
      e.preventDefault();
      const emailOrNick = form.email.value.trim(); // puede ser correo o nick
      const pass  = form.pass.value;

      const usuarios = JSON.parse(localStorage.getItem("usuarios") || "[]");

      const user = usuarios.find(u => 
        (u.email === emailOrNick || u.nick === emailOrNick) && u.pass === pass
      );

      if (user) {
        sessionStorage.setItem("usuarioActivo", JSON.stringify(user));
        window.location.href = "index.html";
      } else {
        error.style.display = "block";
      }
    });
  </script>

  <!-- al final el resto de scripts -->
  <script src="../js/Hamburgesa.js"></script>
</body>
</html>
