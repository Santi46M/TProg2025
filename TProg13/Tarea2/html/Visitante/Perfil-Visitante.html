<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Perfil de Usuario - Visitante</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <a class="brand" href="index.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>
      <nav class="main-nav">
        <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar">
          <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
          <button class="btn" type="submit">Buscar</button>
        </form>
      </nav>
      <nav class="user-nav" id="userNav">
        <a class="btn ghost" href="InicioSesion.html"><i class='bx bxs-user'></i> Iniciar Sesión</a>
        <a class="btn" href="AltaUsuario.html"><i class='bx bxs-user-plus'></i> Registrarse</a>
      </nav>
    </div>
  </header>
  <div class="container row" style="margin-top:1rem;">
    <!-- Sidebar -->
    <aside class="card">
      <h3><i class='bx bx-list-ul'></i> Menú</h3>
      <h4>Categorías</h4>
      <ul>
        <li><a href="index.html?cat=tecnologia"><i class='bx bx-wifi-0'></i> Tecnología</a></li>
        <li><a href="index.html?cat=innovacion"><i class='bx bx-wifi-0'></i> Innovación</a></li>
        <li><a href="index.html?cat=literatura"><i class='bx bx-wifi-0'></i> Literatura</a></li>
        <li><a href="index.html?cat=cultura"><i class='bx bx-wifi-0'></i> Cultura</a></li>
        <li><a href="index.html?cat=musica"><i class='bx bx-wifi-0'></i> Música</a></li>
        <li><a href="index.html?cat=deporte"><i class='bx bx-wifi-0'></i> Deporte</a></li>
        <li><a href="index.html?cat=salud"><i class='bx bx-wifi-0'></i> Salud</a></li>
        <li><a href="index.html?cat=entretenimiento"><i class='bx bx-wifi-0'></i> Entretenimiento</a></li>
        <li><a href="index.html?cat=negocios"><i class='bx bx-wifi-0'></i> Negocios</a></li>
      </ul>
      <h4><a href="ConsultaUsuario-visitante.html">Listar Usuarios</a></h4>
      <div id="menuPorRol"></div>
    </aside>
    <!-- Main -->
    <main>
      <h1>Perfil de Usuario</h1>
      <div id="perfilUsuario" class="card" style="max-width:500px;margin:auto;"></div>
    </main>
  </div>
  <script src="../js/CargaUsers.js"></script>
  <script>
    // Obtener nick de la URL
    function getNickFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('nick') || 'atorres'; // por defecto atorres
    }
    // Mostrar datos de un usuario
    function mostrarPerfilUsuario(nick) {
      const usuarios = JSON.parse(localStorage.getItem("usuarios") || "[]");
      const usuario = usuarios.find(u => u.nick === nick);
      const perfil = document.getElementById("perfilUsuario");
      if (!usuario) {
        perfil.innerHTML = '<p>Usuario no encontrado.</p>';
        return;
      }
      perfil.innerHTML = `
        <div style="text-align:center;">
          <img src="${usuario.img || '../img/default-user.png'}" alt="Foto de perfil" style="width:120px;height:120px;border-radius:50%;object-fit:cover;margin-bottom:1rem;">
        </div>
        <h2 style="text-align:center;">${usuario.nombre} ${usuario.apellido || ''}</h2>
        <p><strong>Nickname:</strong> ${usuario.nick}</p>
        <p><strong>Email:</strong> ${usuario.email}</p>
        ${usuario.rol === 'asistente' ? `<p><strong>Rol:</strong> Asistente</p>
        <p><strong>Fecha de nacimiento:</strong> ${usuario.nac}</p>
        <p><strong>Institución:</strong> ${usuario.instId || '-'}</p>` : ''}
        ${usuario.rol === 'organizador' ? `<p><strong>Rol:</strong> Organizador</p>
        <p><strong>Descripción:</strong> ${usuario.desc || '-'}</p>
        <p><strong>Sitio web:</strong> <a href="${usuario.web}" target="_blank">${usuario.web}</a></p>` : ''}
      `;
    }
    // Cargar perfil según nick de la URL (o por defecto atorres)
    mostrarPerfilUsuario(getNickFromUrl());
  </script>
  <script src="../js/Hamburgesa.js"></script>
  <script src="../js/Login.js"></script>
</body>
</html>
