<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Tipo Registro - Estudiante</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
<!-- Header -->
<header class="site-header">
  <div class="container" style="display:flex;align-items:center;justify-content:space-between;gap:1rem;">
    <!-- Marca -->
    <a class="brand" href="index.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>

    <!-- Buscador -->
    <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar" style="display:flex;gap:.5rem;">
      <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
      <button class="btn" type="submit">Buscar</button>
    </form>
  </div>
</header>

  <!-- Layout -->
  <div class="container row" style="margin-top:1rem;">
    <!-- Sidebar -->
    <aside class="card">
      <h3><i class='bx bx-list-ul'></i> Menú</h3>

      <h4>Categorías</h4>
      <ul>
        <li><a href="#">Tecnología</a></li>
        <li><a href="#">Innovación</a></li>
        <li><a href="#">Literatura</a></li>
        <li><a href="#">Cultura</a></li>
        <li><a href="#">Música</a></li>
        <li><a href="#">Deporte</a></li>
        <li><a href="#">Salud</a></li>
        <li><a href="#">Entretenimiento</a></li>
        <li><a href="#">Negocios</a></li>
      </ul>
      <h4><a href="ConsultaUsuario.html">Listar Usuarios</a></h4>
    </aside>

    <!-- Main -->
	<main class="container consulta-layout">
      <section class="event-card">
        <h1 class="event-title">Estudiante</h1>
        <div class="event-info">
          <h3>Descripción:</h3>
          <p>Acceso para estudiantes</p>
          <div class="event-meta"><strong>Costo:</strong> $1000</div>
          <div class="event-meta"><strong>Cupo:</strong> 50</div>
        </div>
      </section>
    </main>
  </div>

  <script src="../js/Login.js"></script>
  <script>
    const sidebar = document.getElementById('sidebar');
    if(sidebar) sidebar.style.display = 'none';
  </script>
</body>
</html>
