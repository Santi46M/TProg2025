<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear cuenta — Eventos.uy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <a class="brand" href="index.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>

      <nav class="main-nav">
        <!-- Buscador -->
        <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar">
          <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
          <button class="btn" type="submit">Buscar</button>
        </form>
      </nav>

      <!--  Zona de usuario -->
      <nav class="user-nav" id="userNav">
        <a class="btn ghost" href="InicioSesion.html"><i class='bx bxs-user'></i> Iniciar Sesión</a>
        <a class="btn" href="AltaUsuario.html"><i class='bx bxs-user-plus'></i> Registrarse</a>
      </nav>
    </div>
  </header>

  <!-- Layout -->
  <div class="container row" style="margin-top:1rem;">
    <!-- Sidebar -->
    <aside class="card">
      <h3><i class='bx bx-list-ul'></i> Menú</h3>

      <h4>Categorías</h4>
      <ul>
        <li><a href="#">Tecnología</a></li>
        <li><a href="#">Innovación</a></li>
        <li><a href="#">Literatura</a></li>
        <li><a href="#">Cultura</a></li>
        <li><a href="#">Música</a></li>
        <li><a href="#">Deporte</a></li>
        <li><a href="#">Salud</a></li>
        <li><a href="#">Entretenimiento</a></li>
        <li><a href="#">Negocios</a></li>
      </ul>
      <h4><a href="ConsultaUsuario.html">Listar Usuarios</a></h4>
    </aside>

  <main class="container narrow">
    <h1>Crear cuenta</h1>

    <form id="altaForm" class="card form" novalidate>
      <!-- Rol -->
	  <fieldset class="role-group">
	    <legend>Tipo de cuenta</legend>

	    <label class="role-option">
	      <input type="radio" name="rol" value="asistente" checked>
	      <span>Asistente</span>
	    </label>

	    <label class="role-option">
	      <input type="radio" name="rol" value="organizador">
	      <span>Organizador</span>
	    </label>
	  </fieldset>

      <!-- Datos comunes -->
      <div class="row">
        <div>
          <label for="nick">Nick*</label>
          <input id="nick" name="nick" required placeholder="Tu alias">
        </div>
        <div>
          <label for="email">Correo*</label>
          <input id="email" name="email" type="email" required placeholder="tucorreo@ejemplo.com">
        </div>
      </div>

      <div class="row">
        <div>
          <label for="pass">Contraseña*</label>
          <input id="pass" name="pass" type="password" required minlength="4">
        </div>
        <div>
          <label for="pass2">Repetir contraseña*</label>
          <input id="pass2" name="pass2" type="password" required minlength="4">
        </div>
      </div>

      <!-- Grupo ASISTENTE -->
      <section id="grupoAsistente" data-role="asistente">
        <h3>Datos de asistente</h3>
        <div class="row">
          <div>
            <label for="nombreA">Nombre*</label>
            <input id="nombreA" name="nombreA" placeholder="Nombre">
          </div>
          <div>
            <label for="apellidoA">Apellido*</label>
            <input id="apellidoA" name="apellidoA" placeholder="Apellido">
          </div>
        </div>
        <div class="row">
          <div>
            <label for="nacA">Fecha de nacimiento*</label>
            <input id="nacA" name="nacA" type="date">
          </div>
          <div>
            <label for="instIdA">Institución (opcional)</label>
            <input id="instIdA" name="instIdA" placeholder="ID institución">
          </div>
        </div>
      </section>

      <!-- Grupo ORGANIZADOR -->
      <section id="grupoOrganizador" data-role="organizador" style="display:none;">
        <h3>Datos de organizador</h3>
        <div class="row">
          <div>
            <label for="nombreO">Nombre de la organización*</label>
            <input id="nombreO" name="nombreO" placeholder="Ej.: Instituto de Computación">
          </div>
          <div>
            <label for="webO">Sitio web (opcional)</label>
            <input id="webO" name="webO" type="url" placeholder="https://...">
          </div>
        </div>
        <div class="row">
          <div style="width:100%;">
            <label for="descO">Descripción*</label>
            <textarea id="descO" name="descO" rows="3" placeholder="Breve descripción de la organización"></textarea>
          </div>
        </div>
      </section>

      <div class="actions">
        <button type="submit" class="btn">Crear cuenta</button>
        <a class="btn ghost" href="index.html">Cancelar</a>
      </div>

      <p id="msg" style="display:none;"></p>
    </form>
  </main>

  <!-- Cargar datos base primero -->
  <script src="../js/CargaUsers.js"></script>

  <!-- Lógica de alta con rol exclusivo -->
  <script>
  (function(){
    const $ = s => document.querySelector(s);
    const form = $('#altaForm');
    const msg  = $('#msg');

    const grupoA = $('#grupoAsistente');
    const grupoO = $('#grupoOrganizador');

    const rolRadios = form.querySelectorAll('input[name="rol"]');

    function setDisabled(groupEl, disabled){
      groupEl.querySelectorAll('input,select,textarea').forEach(el => el.disabled = disabled);
    }
    function setRequired(el, req){ if (el) el.required = req; }

    // Cambia rol → muestra/oculta y habilita/deshabilita campos
    function applyRoleUI(role){
      const isAsis = role === 'asistente';

      // Mostrar/ocultar
      grupoA.style.display = isAsis ? '' : 'none';
      grupoO.style.display = isAsis ? 'none' : '';

      // Habilitar/deshabilitar
      setDisabled(grupoA, !isAsis);
      setDisabled(grupoO,  isAsis);

      // Requeridos correctos
      setRequired($('#nombreA'), isAsis);
      setRequired($('#apellidoA'), isAsis);
      setRequired($('#nacA'), isAsis);

      setRequired($('#nombreO'), !isAsis);
      setRequired($('#descO'),   !isAsis);
      // webO opcional
    }

    // Init UI
    applyRoleUI('asistente');
    rolRadios.forEach(r => r.addEventListener('change', e => applyRoleUI(e.target.value)));

    function showMsg(text, ok=false){
      msg.textContent = text;
      msg.style.display = 'block';
      msg.style.color = ok ? 'green' : 'red';
    }

    // Validaciones comunes
    function validateCommon(){
      const nick = form.nick.value.trim();
      const email = form.email.value.trim().toLowerCase();
      const pass = form.pass.value;
      const pass2 = form.pass2.value;

      if (!nick || !email || !pass || !pass2) return {ok:false, err:'Completá los campos obligatorios.'};
      if (pass.length < 4) return {ok:false, err:'La contraseña debe tener al menos 4 caracteres.'};
      if (pass !== pass2) return {ok:false, err:'Las contraseñas no coinciden.'};

/*       const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
      const exists = usuarios.some(u =>
        u.nick?.toLowerCase() === nick.toLowerCase() ||
        u.email?.toLowerCase() === email
      );
      if (exists) return {ok:false, err:'El nick o el correo ya están registrados.'};

   */    return {ok:true, nick, email, pass};
    }

/*     function buildUser(role, common){
      if (role === 'asistente'){
        return {
          rol: 'asistente',
          nick: common.nick,
          email: common.email,
          pass: common.pass,
          nombre: form.nombreA.value.trim(),
          apellido: form.apellidoA.value.trim(),
          nac: form.nacA.value,
          instId: form.instIdA.value.trim() || undefined
        };
      } else {
        return {
          rol: 'organizador',
          nick: common.nick,
          email: common.email,
          pass: common.pass,
          nombre: form.nombreO.value.trim(), // nombre de organización
          desc: form.descO.value.trim(),
          web: form.webO.value.trim() || undefined
        };
      }
    } */

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      msg.style.display = 'none';

      const role = form.querySelector('input[name="rol"]:checked')?.value || 'asistente';
      const common = validateCommon();
      if (!common.ok){ showMsg(common.err); return; }

      // Validación específica por rol
      if (role === 'asistente'){
        if (!form.nombreA.value.trim() || !form.apellidoA.value.trim() || !form.nacA.value){
          showMsg('Completá Nombre, Apellido y Fecha de nacimiento.'); return;
        }
      } else {
        if (!form.nombreO.value.trim() || !form.descO.value.trim()){
          showMsg('Completá Nombre de la organización y Descripción.'); return;
        }
      }

      /* const nuevo = buildUser(role, common); */
      /* const usuarios = JSON.parse(localStorage.getItem('usuarios') || '[]');
      usuarios.push(nuevo);
      localStorage.setItem('usuarios', JSON.stringify(usuarios));

      // Iniciar sesión automáticamente
      sessionStorage.setItem('usuarioActivo', JSON.stringify(nuevo));
      */
      showMsg('Cuenta creada con éxito. Redirigiendo…', true);
      window.location.href = 'index.html';
    });
  })();
  </script>

	<!-- <script src="../js/Hamburgesa.js"></script> -->
  <script src="../js/Login.js"></script>
</body>
</html>
