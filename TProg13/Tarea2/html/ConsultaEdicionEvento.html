<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Consulta de Edición de Evento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/ConsultaEdicionEvento.css" />
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
     
	<!-- Botón hamburguesa -->
	<button class="hamburguesa" onclick="toggleMenu()">
	  ☰
	</button>
	
	<!-- Sidebar -->
	<aside id="sidebar" class="sidebar-mobile">
	  <h3><i class='bx bx-list-ul'></i> Menú</h3>
	  <ul id="menuList">
	    <!-- Aquí JS inyecta el menú según rol -->
	  </ul>

	</aside>
     <a class="brand" href="index.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>
      <nav class="main-nav">
        	    <!-- Izquierda: buscador -->
	    <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar">
	      <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
	      <button class="btn" type="submit">Buscar</button>
	    </form>
      </nav>
          <!-- 🔹 Zona dinámica de usuario -->
    <nav class="user-nav" id="userNav">
      <a class="btn ghost" href="InicioSesion.html"><i class='bx bxs-user'></i> Iniciar Sesión</a>
      <a class="btn" href="AltaUsuario.html"><i class='bx bxs-user-plus'></i> Registrarse</a>
    </nav>
    </div>
  </header>

  <main class="container narrow">
    <h1>Consulta de Edición de Evento</h1>

    <!-- Selectores -->
    <section class="card">
      <div class="row">
        <div>
          <label for="selEvento">Evento</label>
          <select id="selEvento">
            <option value="">-- Seleccionar evento --</option>
          </select>
        </div>
        <div>
          <label for="selEdicion">Edición (Aprobada)</label>
          <select id="selEdicion" disabled>
            <option value="">-- Seleccionar edición --</option>
          </select>
        </div>
      </div>
    </section>

    <!-- Detalle -->
    <section id="boxDetalle" class="card hide">
      <div class="edicion-head">
        <div class="edicion-text">
          <h2 id="edNombre">—</h2>
          <p class="muted" id="edUbicacion">—</p>
          <p class="muted" id="edEstado">—</p>
          <p><strong>Organizador:</strong> <span id="edOrganizador">—</span></p>
        </div>
        <div class="edicion-img" id="edImgWrap"></div>
      </div>

      <div class="columns">
        <div>
          <h3>Tipos de registro</h3>
          <ul id="listRegistros" class="clean"></ul>
        </div>
        <div>
          <h3>Patrocinios</h3>
          <ul id="listPatrocinios" class="clean"></ul>
        </div>
      </div>
    </section>
  </main>

  <script>
  // ============================
  // Ejemplos hardcodeados
  // ============================
  const DATA = [
    {
      id: "ev1", nombre: "JSConf",
      ediciones: [
        {
          id:"ed1", nombre:"JSConf 2025", estado:"Aprobada",
          ciudad:"Montevideo", pais:"Uruguay", organizador:"Ana Pérez",
          tiposRegistros:["General","VIP"],
          patrocinios:["Platino — ACME", "Oro — DevCorp"],
          imagen:"https://picsum.photos/seed/jsconf/640/360"
        },
        {
          id:"ed2", nombre:"JSConf 2026", estado:"Ingresada",
          ciudad:"Colonia", pais:"Uruguay", organizador:"Ana Pérez",
          tiposRegistros:["General"], patrocinios:[]
        }
      ]
    },
    {
      id: "ev2", nombre: "UX Day",
      ediciones: [
        {
          id:"ed3", nombre:"UX Day 2025", estado:"Aprobada",
          ciudad:"Buenos Aires", pais:"Argentina", organizador:"Beto García",
          tiposRegistros:["General","Estudiante"],
          patrocinios:["Plata — Pixel SA"],
          imagen:"https://picsum.photos/seed/uxday/640/360"
        }
      ]
    },
    {
      id: "ev3", nombre: "Data Summit",
      ediciones: [
        {
          id:"ed4", nombre:"Data Summit 2024", estado:"Aprobada",
          ciudad:"Madrid", pais:"España", organizador:"Carla López",
          tiposRegistros:["General","Premium"],
          patrocinios:["Oro — BigData Corp", "Plata — CloudX"],
          imagen:"https://picsum.photos/seed/datasummit/640/360"
        }
      ]
    },
    {
        id: "ev4", nombre: "Maraton de Montevideo",
        ediciones: [
          {
            id:"ed5", nombre:"Maraton 2025", estado:"Aprobada",
            ciudad:"Montevideo", pais:"Uruguay", organizador:"imm",
            tiposRegistros:["10 KM","20 KM"],
            patrocinios:["Platino — Salus", "Oro — Casmu"],
            imagen:"../img/maratonmontevideo.js"
          }
        ]
      }
  ];

  // Utilidades
  const $ = s => document.querySelector(s);
  const el = (t, attrs={}, txt) => {
    const n = document.createElement(t);
    Object.entries(attrs).forEach(([k,v]) => n.setAttribute(k,v));
    if (txt!=null) n.textContent = txt;
    return n;
  };



  // 1) Cargar eventos
  function cargarEventos() {
    DATA.forEach(ev => selEvento.appendChild(el('option', {value: ev.id}, ev.nombre)));
  }

  // 2) Al elegir evento → cargar ediciones aprobadas
  selEvento.addEventListener('change', () => {
    selEdicion.innerHTML = '<option value="">-- Seleccionar edición --</option>';
    boxDetalle.classList.add('hide');
    const ev = DATA.find(x => x.id === selEvento.value);
    if (!ev) { selEdicion.disabled = true; return; }
    ev.ediciones.filter(e => e.estado === 'Aprobada')
      .forEach(e => selEdicion.appendChild(el('option', {value: e.id}, e.nombre)));
    selEdicion.disabled = false;
  });

  // 3) Al elegir edición → mostrar detalles
  selEdicion.addEventListener('change', () => {
    const ev = DATA.find(x => x.id === selEvento.value);
    if (!ev) return;
    const ed = ev.ediciones.find(x => x.id === selEdicion.value);
    if (!ed) { boxDetalle.classList.add('hide'); return; }

    edNombre.textContent = ed.nombre;
    edUbicacion.textContent = `${ed.ciudad}, ${ed.pais}`;
    edEstado.textContent = `Estado: ${ed.estado}`;
    edOrganizador.textContent = ed.organizador;

    edImgWrap.innerHTML = '';
    if (ed.imagen) {
      const img = el('img', {src: ed.imagen, alt: ed.nombre});
      edImgWrap.appendChild(img);
    }

    listRegistros.innerHTML = '';
    (ed.tiposRegistros || []).forEach(r => listRegistros.appendChild(el('li', {}, r)));

    listPatrocinios.innerHTML = '';
    (ed.patrocinios || []).forEach(p => listPatrocinios.appendChild(el('li', {}, p)));

    boxDetalle.classList.remove('hide');
  });

  cargarEventos();
  </script>
   <script src="../js/Hamburgesa.js"></script>
<script src="../js/Login.js"></script>
</body>
</html>
