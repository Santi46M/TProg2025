<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Consulta de Edición de Evento — Eventos.uy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/ConsultaEdicionEvento.css" />
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <button class="hamburguesa" onclick="toggleMenu()">☰</button>
      <aside id="sidebar" class="sidebar-mobile">
        <h3><i class='bx bx-list-ul'></i> Menú</h3>
        <ul id="menuList"><!-- Aquí JS inyecta el menú según rol --></ul>
      </aside>
      <a class="brand" href="index.html"><i class='bx bxs-plane-alt'></i> Eventos.uy</a>
      <nav class="main-nav">
        <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar">
          <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones" />
          <button class="btn" type="submit">Buscar</button>
        </form>
      </nav>
      <nav class="user-nav" id="userNav">
        <a class="btn ghost" href="InicioSesion.html"><i class='bx bxs-user'></i> Iniciar Sesión</a>
        <a class="btn" href="AltaUsuario.html"><i class='bx bxs-user-plus'></i> Registrarse</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="layout">
      <aside class="sidebar">
        <nav class="side-group">
          <h3>Categorías</h3>
          <a href="index.html?cat=tecnologia">Tecnología</a>
          <a href="index.html?cat=innovacion">Innovación</a>
          <a href="index.html?cat=deporte">Deporte</a>
          <a href="index.html?cat=salud">Salud</a>
          <a href="index.html?cat=negocios">Negocios</a>
        </nav>
      </aside>

      <article class="content">
        <h1>Consulta de Edición de Evento</h1>

        <section class="card">
          <div class="row">
            <div>
              <label for="selEvento">Evento</label>
              <select id="selEvento">
                <option value="">-- Seleccionar evento --</option>
              </select>
            </div>
            <div>
              <label for="selEdicion">Edición (Aprobada)</label>
              <select id="selEdicion" disabled>
                <option value="">-- Seleccionar edición --</option>
              </select>
            </div>
          </div>
        </section>

        <section id="boxDetalle" class="card hide">
          <div class="edicion-head">
            <div class="edicion-text">
              <h2 id="edNombre">—</h2>
              <p class="muted" id="edUbicacion">—</p>
              <p class="muted" id="edEstado">—</p>
              <p><strong>Organizador:</strong> <span id="edOrganizador">—</span></p>
            </div>
            <div class="edicion-img" id="edImgWrap"></div>
          </div>

          <div class="columns">
            <div>
              <h3>Tipos de registro</h3>
              <ul id="listRegistros" class="clean"></ul>
            </div>
            <div>
              <h3>Patrocinios</h3>
              <ul id="listPatrocinios" class="clean"></ul>
            </div>
          </div>
        </section>
      </article>
    </section>
  </main>

  <!-- 1) Datos primero -->
  <script src="../js/CargaUsers.js"></script>

  <!-- 2) Lógica de la página -->
  <script>
  (function(){
    const $ = s => document.querySelector(s);
    const el = (t, attrs={}, txt) => { const n=document.createElement(t); Object.entries(attrs).forEach(([k,v])=>n.setAttribute(k,v)); if (txt!=null) n.textContent=txt; return n; };

    const EVENTOS = JSON.parse(localStorage.getItem("eventos") || "[]");

    const selEvento   = document.getElementById('selEvento');
    const selEdicion  = document.getElementById('selEdicion');
    const boxDetalle  = document.getElementById('boxDetalle');
    const edNombre    = document.getElementById('edNombre');
    const edUbicacion = document.getElementById('edUbicacion');
    const edEstado    = document.getElementById('edEstado');
    const edOrganizador = document.getElementById('edOrganizador');
    const edImgWrap   = document.getElementById('edImgWrap');
    const listRegistros   = document.getElementById('listRegistros');
    const listPatrocinios = document.getElementById('listPatrocinios');

    function findEditionById(editionId){
      for (const ev of EVENTOS){
        const ed = (ev.ediciones||[]).find(e => e.id === editionId);
        if (ed) return { ev, ed };
      }
      return null;
    }

    function cargarEventos() {
      EVENTOS.forEach(ev => selEvento.appendChild(el('option', {value: ev.id}, ev.nombre)));
    }

    selEvento.addEventListener('change', () => {
      selEdicion.innerHTML = '<option value="">-- Seleccionar edición --</option>';
      boxDetalle.classList.add('hide');

      const ev = EVENTOS.find(x => x.id === selEvento.value);
      if (!ev) { selEdicion.disabled = true; return; }

      (ev.ediciones||[])
        .filter(e => e.estado === 'Aceptada')
        .forEach(e => selEdicion.appendChild(el('option', {value: e.id}, e.nombre)));

      selEdicion.disabled = false;
    });

    selEdicion.addEventListener('change', () => {
      const ev = EVENTOS.find(x => x.id === selEvento.value);
      if (!ev) return;

      const ed = (ev.ediciones||[]).find(x => x.id === selEdicion.value);
      if (!ed) { boxDetalle.classList.add('hide'); return; }

      edNombre.textContent = ed.nombre || '—';
      edUbicacion.textContent = `${ed.ciudad||''}, ${ed.pais||''}`;
      edEstado.textContent = `Estado: ${ed.estado||''}`;
      edOrganizador.textContent = ed.organizador || '—';

      edImgWrap.innerHTML = '';
      if (ed.imagen) {
        const img = el('img', {src: ed.imagen, alt: ed.nombre});
        edImgWrap.appendChild(img);
      }

      listRegistros.innerHTML = '';
      (ed.tiposRegistros || []).forEach(r => {
        const li = el('li');
        const a  = el('a', { href: `ConsultaTipoRegistro.html?ed=${ed.id}&reg=${r.id}`, class: 'link-reg' }, r.nombre);
        li.appendChild(a);
        listRegistros.appendChild(li);
      });

      listPatrocinios.innerHTML = '';
      (ed.patrocinios || []).forEach(p => {
        let txt = '';
        if (typeof p === 'string') txt = p;
        else {
          const parts = [];
          if (p.nivel) parts.push(p.nivel);
          if (p.institucion) parts.push('— ' + p.institucion);
          if (p.tipo) parts.push(`(${p.tipo})`);
          txt = parts.join(' ');
        }
        listPatrocinios.appendChild(el('li', {}, txt));
      });

      boxDetalle.classList.remove('hide');
    });

    function preselectFromURL(){
      const params = new URLSearchParams(location.search);
      const edParam = params.get('ed') || params.get('id');
      if (!edParam) return;
      const found = findEditionById(edParam);
      if (!found) return;

      selEvento.value = found.ev.id;
      selEvento.dispatchEvent(new Event('change'));

      selEdicion.value = found.ed.id;
      selEdicion.dispatchEvent(new Event('change'));
    }

    cargarEventos();
    preselectFromURL();
  })();
  </script>

  <!-- 3) Resto -->
  <script src="../js/Hamburgesa.js"></script>
  <script src="../js/Login.js"></script>
</body>
</html>
