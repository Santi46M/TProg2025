<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Consulta de Tipo de Registro</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-grid">
      <!-- Izquierda: buscador -->
      <form class="search" action="/buscar" method="get" role="search" aria-label="Buscar">
        <input class="search-input" type="search" name="q" placeholder="Eventos, Ediciones">
        <button class="btn" type="submit">Buscar</button>
      </form>

      <!-- Centro: brand -->
      <a class="brand" href="PrincipalLogueado.html">Eventos.uy</a>

      <!-- Derecha: usuario -->
      <nav class="user-nav" aria-label="Usuario">
        <a class="user" href="ModificarUsuario.html" title="Modificar mis datos">
          <img src="../img/avatar.png" alt="Foto de perfil">
          <span class="user-name">Nombre</span>
        </a>
        <a class="btn ghost" href="index.html">Cerrar sesión</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="form-card-consultaTipoRegistro">
      <h2>Consulta de Tipo de Registro</h2>

      <!-- Paso 1: Eventos -->
      <div class="form-group-consultaTipoRegistro">
        <label for="evento">Seleccione un evento*</label>
        <select id="evento" name="evento" required>
          <option value="">-- Seleccione un evento --</option>
          <option value="evento1">Evento 1</option>
          <option value="evento2">Evento 2</option>
        </select>
      </div>

      <!-- Paso 2: Ediciones aprobadas -->
      <div class="form-group-consultaTipoRegistro">
        <label for="edicion">Seleccione una edición (Aprobada)*</label>
        <select id="edicion" name="edicion" required>
          <option value="">-- Seleccione una edición --</option>
          <option value="edicion1">Edición 1</option>
          <option value="edicion2">Edición 2</option>
        </select>
      </div>

      <!-- Paso 3: Tipos de registro -->
      <div class="form-group-consultaTipoRegistro">
        <label for="tipoRegistro">Seleccione un tipo de registro*</label>
        <select id="tipoRegistro" name="tipoRegistro" required>
          <option value="">-- Seleccione un tipo de registro --</option>
          <option value="general">General</option>
          <option value="estudiante">Estudiante</option>
        </select>
      </div>

      <!-- Paso 4: Detalles del tipo de registro -->
      <section id="registro-detalles-consultaTipoRegistro" class="registro-detalles-consultaTipoRegistro">
        <h3>Detalles del Tipo de Registro</h3>
        <ul>
          <li><strong>Nombre:</strong> </li>
          <li><strong>Descripción:</strong></li>
          <li><strong>Costo:</strong> </li>
          <li><strong>Cupo:</strong></li>
        </ul>
      </section>
    </section>  
  </main>
  <script>
  const tipoRegistroSelect = document.getElementById("tipoRegistro");
  const detalles = document.getElementById("registro-detalles-consultaTipoRegistro");



  tipoRegistroSelect.addEventListener("change", function () {
	if (this.value) {
      detalles.classList.remove("hidden");

      
      if (this.value === "general") {
        detalles.querySelector("ul").innerHTML = `
          <li><strong>Nombre:</strong> General</li>
          <li><strong>Descripción:</strong> Acceso completo a todas las actividades</li>
          <li><strong>Costo:</strong> $1500</li>
          <li><strong>Cupo:</strong> 200</li>
        `;
      } else if (this.value === "estudiante") {
        detalles.querySelector("ul").innerHTML = `
          <li><strong>Nombre:</strong> Estudiante</li>
          <li><strong>Descripción:</strong> Acceso a actividades con descuento</li>
          <li><strong>Costo:</strong> $800</li>
          <li><strong>Cupo:</strong> 100</li>
        `;
      }
    } else {
      detalles.classList.add("hidden");
    }
  });

</script>
</body>
</html>
